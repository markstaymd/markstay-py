# Publish `markstay` to PyPI via Trusted Publishing (OIDC, no stored token).
#
# Setup (one-time, done in the PyPI account UI as the persona):
#   PyPI -> the markstay project (or "pending publisher" before the first
#   release) -> Publishing -> add a GitHub trusted publisher:
#     owner:        markstaymd
#     repository:   markstay-py
#     workflow:     publish.yml
#     environment:  pypi
#
# Release flow: cut a GitHub Release (tag vX.Y.Z) on markstaymd/markstay-py.
# The job builds, runs the conformance + unit suite, then publishes via OIDC.

name: publish

on:
  release:
    types: [published]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - run: pip install -e ".[commonmark]" pytest
      - run: pytest -q

  publish:
    needs: test
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write   # required for OIDC trusted publishing
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
